<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>【管理者用】デジタルカード生成ツール</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-100 text-gray-800">

  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // 🚨 新しいGASのURLに書き換えたに！
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbza1jomxSF6eFKhokzYXH3pw7sC15qre4235Gp43J6RbxnnHp6VRSpfqh4iUQ4vahVS/exec';

    const App = () => {
      // 🔑 secret（合言葉）を追加
      const [formData, setFormData] = useState({ to: '', message: '', from: '', theme: 'wedding', secret: '' });
      const [shareUrl, setShareUrl] = useState('');
      const [isLoading, setIsLoading] = useState(false);

      const handleChange = (e) => {
        setFormData({ ...formData, [e.target.name]: e.target.value });
      };

      const handleGenerate = (e) => {
        e.preventDefault();
        setIsLoading(true);

        const params = new URLSearchParams(formData);

        fetch(GAS_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: params.toString()
        })
        .then(res => res.json())
        .then(data => {
          setIsLoading(false);
          if (data.success) {
            const newUrl = `${window.location.origin}${window.location.pathname.replace('admin.html', '')}?id=${data.id}`;
            setShareUrl(newUrl);
            // 発行成功したらパスワード欄だけ空に戻しとく
            setFormData({ ...formData, secret: '' });
          } else {
            alert('エラー: ' + data.error); 
          }
        })
        .catch(err => {
          setIsLoading(false);
          alert('通信エラー');
        });
      };

      const copyToClipboard = () => {
        navigator.clipboard.writeText(shareUrl);
        alert('納品用リンクをコピーしました！');
      };

      return (
        <div className="min-h-screen p-8">
          <div className="max-w-2xl mx-auto bg-white p-8 rounded-xl shadow-md border-t-4 border-indigo-600">
            <h1 className="text-2xl font-bold mb-6 text-indigo-800"><i className="fa-solid fa-lock mr-2"></i>【管理者用】カード生成コンソール</h1>
            
            <form onSubmit={handleGenerate} className="space-y-4">
              
              {/* 🔑 パスワード入力欄 */}
              <div className="bg-red-50 p-4 rounded border border-red-200 mb-6">
                <label className="block text-sm font-bold text-red-700 mb-1"><i className="fa-solid fa-key mr-1"></i>管理者パスワード</label>
                <input type="password" name="secret" required value={formData.secret} onChange={handleChange} className="w-full px-4 py-2 border border-red-300 rounded focus:outline-none focus:ring-2 focus:ring-red-400" placeholder="秘密の合言葉を入力" />
              </div>

              <div className="grid grid-cols-2 gap-4">
                <div>
                  <label className="block text-sm font-bold text-gray-600 mb-1">To (宛名)</label>
                  <input type="text" name="to" required value={formData.to} onChange={handleChange} className="w-full px-4 py-2 border rounded bg-gray-50" />
                </div>
                <div>
                  <label className="block text-sm font-bold text-gray-600 mb-1">From (送り主)</label>
                  <input type="text" name="from" value={formData.from} onChange={handleChange} className="w-full px-4 py-2 border rounded bg-gray-50" />
                </div>
              </div>
              
              <div>
                <label className="block text-sm font-bold text-gray-600 mb-1">メッセージ本文</label>
                <textarea name="message" required value={formData.message} onChange={handleChange} rows="5" className="w-full px-4 py-2 border rounded bg-gray-50"></textarea>
              </div>
              
              <div>
                <label className="block text-sm font-bold text-gray-600 mb-1">テーマ選択</label>
                <select name="theme" value={formData.theme} onChange={handleChange} className="w-full px-4 py-2 border rounded bg-white font-bold">
                  <option value="wedding">🕊️ Wedding（白/ゴールド・結婚式用）</option>
                  <option value="birthday">🎂 Birthday（カラフル・誕生日用）</option>
                  <option value="elegant">🥂 Elegant（ネイビー/雪・シックでおしゃれ）</option>
                  <option value="hearts">💖 Hearts（ピンク/ハート）</option>
                  <option value="stars">⭐ Stars（ネイビー/星）</option>
                </select>
              </div>
              
              <button type="submit" disabled={isLoading} className="w-full bg-indigo-600 text-white font-bold py-3 rounded hover:bg-indigo-700 disabled:opacity-50 mt-4">
                {isLoading ? '認証・生成中...' : 'セキュアに納品用URLを発行する'}
              </button>
            </form>

            {shareUrl && (
              <div className="mt-8 p-6 bg-indigo-50 rounded border border-indigo-200">
                <p className="font-bold text-indigo-800 mb-2">✅ 発行完了（お客様納品用URL）</p>
                <input type="text" readOnly value={shareUrl} className="w-full px-3 py-2 border border-indigo-300 rounded bg-white text-sm mb-3" />
                <div className="flex gap-2">
                  <button onClick={copyToClipboard} className="flex-1 bg-gray-800 text-white font-bold py-2 rounded hover:bg-gray-700">
                    コピーする
                  </button>
                  <a href={shareUrl} target="_blank" className="flex-1 text-center border-2 border-gray-800 text-gray-800 font-bold py-2 rounded hover:bg-gray-100">
                    動作確認プレビュー
                  </a>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
