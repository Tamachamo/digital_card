<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>動くデジタルメッセージカード</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { margin: 0; overflow-x: hidden; font-family: 'Helvetica Neue', Arial, sans-serif; }
    
    @keyframes floatUp {
      0% { transform: translateY(100vh) scale(0.5) rotate(0deg); opacity: 0; }
      10% { opacity: 0.8; }
      90% { opacity: 0.8; }
      100% { transform: translateY(-10vh) scale(1.5) rotate(360deg); opacity: 0; }
    }
    .animate-float { animation: floatUp linear infinite; position: absolute; bottom: -10%; }

    @keyframes fallDown {
      0% { transform: translateY(-10vh) scale(0.5) rotate(0deg); opacity: 0; }
      10% { opacity: 0.8; }
      90% { opacity: 0.8; }
      100% { transform: translateY(100vh) scale(1.2) rotate(360deg); opacity: 0; }
    }
    .animate-fall { animation: fallDown linear infinite; position: absolute; top: -10%; }

    @keyframes popIn {
      0% { transform: scale(0.8); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    .animate-pop-in { animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
  </style>
</head>
<body class="bg-gray-50 text-gray-800">

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // 🚨🚨🚨 重要：ここを書き換える！ 🚨🚨🚨
    // URLの前後の 「 ' 」（シングルクォーテーション）は絶対に消さないでな！
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbytIKnQYCHXeWg_97NBASFbEfosJzmvHoyVief2qeDwG1df75mPtyNUawQf8C8voOE/exec';

    const App = () => {
      const [view, setView] = useState('form'); 
      const [formData, setFormData] = useState({ to: '', message: '', from: '', theme: 'hearts' });
      const [shareUrl, setShareUrl] = useState('');
      const [errorMsg, setErrorMsg] = useState('');

      useEffect(() => {
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');

        if (id) {
          setView('loading');
          fetch(`${GAS_URL}?id=${id}`)
            .then(res => res.json())
            .then(data => {
              if (data.success) {
                setFormData(data.data);
                setView('card');
              } else {
                setErrorMsg('カードが見つからんかったわわ…。');
                setView('error');
              }
            })
            .catch(err => {
              setErrorMsg('通信エラーが発生したに！');
              setView('error');
            });
        }
      }, []);

      const handleChange = (e) => {
        setFormData({ ...formData, [e.target.name]: e.target.value });
      };

      const handleGenerate = (e) => {
        e.preventDefault();
        setView('loading');

        const params = new URLSearchParams({
          to: formData.to,
          message: formData.message,
          from: formData.from,
          theme: formData.theme
        });

        fetch(GAS_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: params.toString()
        })
        .then(res => res.json())
        .then(data => {
          if (data.success) {
            const newUrl = `${window.location.origin}${window.location.pathname}?id=${data.id}`;
            setShareUrl(newUrl);
            setView('preview');
          } else {
            alert('保存に失敗したに！');
            setView('form');
          }
        })
        .catch(err => {
          alert('通信エラーやわ！GASのURLは合っとるか確認してな！');
          setView('form');
        });
      };

      const copyToClipboard = () => {
        navigator.clipboard.writeText(shareUrl);
        alert('短いリンクをコピーしたに！ LINE等で送ったってな！');
      };

      if (view === 'loading') {
        return (
          <div className="min-h-screen flex items-center justify-center bg-gray-50">
            <div className="text-center">
              <i className="fa-solid fa-spinner fa-spin text-4xl text-indigo-500 mb-4"></i>
              <p className="text-gray-600 font-bold animate-pulse">サーバーと通信中やに…💤</p>
            </div>
          </div>
        );
      }

      if (view === 'error') {
        return (
          <div className="min-h-screen flex items-center justify-center bg-gray-50">
            <div className="text-center bg-white p-8 rounded-3xl shadow-md border border-red-100">
              <i className="fa-solid fa-triangle-exclamation text-4xl text-red-500 mb-4"></i>
              <p className="text-gray-800 font-bold">{errorMsg}</p>
              <button onClick={() => setView('form')} className="mt-6 bg-indigo-100 text-indigo-700 font-bold py-2 px-6 rounded-full hover:bg-indigo-200">
                トップに戻る
              </button>
            </div>
          </div>
        );
      }

      if (view === 'form' || view === 'preview') {
        return (
          <div className="min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-indigo-50 to-pink-50">
            <div className="bg-white p-8 rounded-3xl shadow-xl max-w-md w-full animate-pop-in border border-gray-100">
              <h1 className="text-2xl font-extrabold text-center mb-6 text-gray-800"><i className="fa-solid fa-wand-magic-sparkles text-indigo-500 mr-2"></i>デジタルカード生成器</h1>
              
              <form onSubmit={handleGenerate} className="space-y-4">
                <div>
                  <label className="block text-sm font-bold text-gray-600 mb-1">贈る相手のお名前</label>
                  <input type="text" name="to" required value={formData.to} onChange={handleChange} className="w-full px-4 py-2 border rounded-xl focus:ring-2 focus:ring-indigo-400 outline-none" />
                </div>
                <div>
                  <label className="block text-sm font-bold text-gray-600 mb-1">メッセージ</label>
                  <textarea name="message" required value={formData.message} onChange={handleChange} rows="3" className="w-full px-4 py-2 border rounded-xl focus:ring-2 focus:ring-indigo-400 outline-none"></textarea>
                </div>
                <div>
                  <label className="block text-sm font-bold text-gray-600 mb-1">あなたのお名前（任意）</label>
                  <input type="text" name="from" value={formData.from} onChange={handleChange} className="w-full px-4 py-2 border rounded-xl focus:ring-2 focus:ring-indigo-400 outline-none" />
                </div>
                <div>
                  <label className="block text-sm font-bold text-gray-600 mb-1">アニメーションテーマ</label>
                  <select name="theme" value={formData.theme} onChange={handleChange} className="w-full px-4 py-2 border rounded-xl focus:ring-2 focus:ring-indigo-400 outline-none bg-white">
                    <option value="hearts">💖 ふわふわハート</option>
                    <option value="stars">⭐ きらきら星</option>
                  </select>
                </div>
                <button type="submit" className="w-full bg-indigo-600 text-white font-bold py-3 rounded-xl hover:bg-indigo-700 transition-colors shadow-md mt-4">
                  短いURLでカードを生成する
                </button>
              </form>

              {view === 'preview' && (
                <div className="mt-8 p-6 bg-gray-50 rounded-2xl border border-indigo-100 text-center animate-pop-in">
                  <p className="text-sm font-bold text-indigo-600 mb-3"><i className="fa-solid fa-check-circle mr-1"></i>URLが完成したに！</p>
                  <p className="text-xs text-gray-500 mb-3 break-all">{shareUrl}</p>
                  <div className="flex flex-col gap-2">
                    <a href={shareUrl} target="_blank" className="block w-full bg-white border-2 border-indigo-600 text-indigo-600 font-bold py-2.5 rounded-xl hover:bg-indigo-50 transition-colors">
                      <i className="fa-solid fa-eye mr-2"></i>自分でプレビューを見る
                    </a>
                    <button onClick={copyToClipboard} className="w-full bg-gray-800 text-white font-bold py-2.5 rounded-xl hover:bg-gray-700 transition-colors shadow-sm">
                      <i className="fa-solid fa-link mr-2"></i>短いリンクをコピー
                    </button>
                  </div>
                </div>
              )}
            </div>
          </div>
        );
      }

      const themeConfig = {
        hearts: { bg: 'bg-pink-100', icon: 'fa-heart text-pink-400', animation: 'animate-float' },
        stars: { bg: 'bg-indigo-900 text-white', icon: 'fa-star text-yellow-300', animation: 'animate-fall' }
      };
      const currentTheme = themeConfig[formData.theme] || themeConfig.hearts;
      const particles = Array.from({ length: 20 });

      return (
        <div className={`min-h-screen relative overflow-hidden flex items-center justify-center p-4 transition-colors duration-1000 ${currentTheme.bg}`}>
          {particles.map((_, i) => {
            const size = Math.random() * 2 + 1; 
            const left = Math.random() * 100; 
            const delay = Math.random() * 5; 
            const duration = Math.random() * 5 + 5; 
            return (
              <i key={i} className={`fa-solid ${currentTheme.icon} ${currentTheme.animation}`} style={{ fontSize: `${size}rem`, left: `${left}%`, animationDelay: `${delay}s`, animationDuration: `${duration}s`, opacity: Math.random() * 0.5 + 0.2 }}></i>
            );
          })}
          <div className="relative z-10 bg-white/90 backdrop-blur-md p-8 md:p-12 rounded-3xl shadow-2xl max-w-lg w-full animate-pop-in border border-white/50 text-gray-800">
            <h2 className="text-2xl md:text-3xl font-bold mb-6 text-gray-800 border-b-2 border-gray-100 pb-4">{formData.to} へ</h2>
            <p className="text-lg md:text-xl leading-relaxed whitespace-pre-wrap font-medium text-gray-600 min-h-[100px]">{formData.message}</p>
            {formData.from && <p className="text-right mt-8 text-lg font-bold text-gray-500">From: {formData.from}</p>}
            <div className="mt-12 text-center pt-6 border-t border-gray-100">
              <a href={window.location.origin + window.location.pathname} className="text-sm font-bold text-indigo-500 hover:text-indigo-700 transition-colors inline-block bg-indigo-50 px-4 py-2 rounded-full">
                <i className="fa-solid fa-gift mr-1.5"></i>自分もこのカードを贈る
              </a>
            </div>
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
