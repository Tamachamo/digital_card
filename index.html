<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>動くデジタルメッセージカード</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* 🌟 アニメーションの魔法（CSS） */
    body { margin: 0; overflow-x: hidden; font-family: 'Helvetica Neue', Arial, sans-serif; }
    
    /* ふわふわ浮かぶハート用 */
    @keyframes floatUp {
      0% { transform: translateY(100vh) scale(0.5) rotate(0deg); opacity: 0; }
      10% { opacity: 0.8; }
      90% { opacity: 0.8; }
      100% { transform: translateY(-10vh) scale(1.5) rotate(360deg); opacity: 0; }
    }
    .animate-float { animation: floatUp linear infinite; position: absolute; bottom: -10%; }

    /* 降り注ぐ星用 */
    @keyframes fallDown {
      0% { transform: translateY(-10vh) scale(0.5) rotate(0deg); opacity: 0; }
      10% { opacity: 0.8; }
      90% { opacity: 0.8; }
      100% { transform: translateY(100vh) scale(1.2) rotate(360deg); opacity: 0; }
    }
    .animate-fall { animation: fallDown linear infinite; position: absolute; top: -10%; }

    /* カード出現のフワッとエフェクト */
    @keyframes popIn {
      0% { transform: scale(0.8); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    .animate-pop-in { animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
  </style>
</head>
<body class="bg-gray-50 text-gray-800">

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const App = () => {
      // 🧠 状態管理（State）
      const [view, setView] = useState('form'); // 'form' または 'card'
      const [formData, setFormData] = useState({ to: '', message: '', from: '', theme: 'hearts' });
      const [shareUrl, setShareUrl] = useState('');

      // 🚀 初期読み込み時：URLにデータがあればカードを表示するに！
      useEffect(() => {
        const params = new URLSearchParams(window.location.search);
        const to = params.get('to');
        const message = params.get('msg');
        const from = params.get('from');
        const theme = params.get('theme');

        if (to && message) {
          setFormData({ to, message, from: from || '', theme: theme || 'hearts' });
          setView('card');
        }
      }, []);

      // 📝 フォーム入力ハンドラー
      const handleChange = (e) => {
        setFormData({ ...formData, [e.target.name]: e.target.value });
      };

      // ✨ カード生成＆URL作成
      const handleGenerate = (e) => {
        e.preventDefault();
        // 入力データをURLパラメータにエンコードしてURLを作るに！
        const params = new URLSearchParams({
          to: formData.to,
          msg: formData.message,
          from: formData.from,
          theme: formData.theme
        });
        const newUrl = `${window.location.origin}${window.location.pathname}?${params.toString()}`;
        setShareUrl(newUrl);
        setView('preview');
      };

      // 📋 URLコピー機能
      const copyToClipboard = () => {
        navigator.clipboard.writeText(shareUrl);
        alert('リンクをコピーしたに！ 相手に送って驚かせたってな！');
      };

      // ==========================================
      // 🎨 画面1：入力フォーム（カードを作る画面）
      // ==========================================
      if (view === 'form' || view === 'preview') {
        return (
          <div class="min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-indigo-50 to-pink-50">
            <div class="bg-white p-8 rounded-3xl shadow-xl max-w-md w-full animate-pop-in border border-gray-100">
              <h1 class="text-2xl font-extrabold text-center mb-6 text-gray-800"><i class="fa-solid fa-wand-magic-sparkles text-indigo-500 mr-2"></i>デジタルカード生成器</h1>
              
              <form onSubmit={handleGenerate} class="space-y-4">
                <div>
                  <label class="block text-sm font-bold text-gray-600 mb-1">贈る相手のお名前</label>
                  <input type="text" name="to" required value={formData.to} onChange={handleChange} class="w-full px-4 py-2 border rounded-xl focus:ring-2 focus:ring-indigo-400 outline-none" placeholder="例：ぐでにゃん様" />
                </div>
                <div>
                  <label class="block text-sm font-bold text-gray-600 mb-1">メッセージ</label>
                  <textarea name="message" required value={formData.message} onChange={handleChange} rows="3" class="w-full px-4 py-2 border rounded-xl focus:ring-2 focus:ring-indigo-400 outline-none" placeholder="日頃の感謝や、お祝いの言葉をどうぞ！"></textarea>
                </div>
                <div>
                  <label class="block text-sm font-bold text-gray-600 mb-1">あなたのお名前（任意）</label>
                  <input type="text" name="from" value={formData.from} onChange={handleChange} class="w-full px-4 py-2 border rounded-xl focus:ring-2 focus:ring-indigo-400 outline-none" placeholder="例：プロデューサーより" />
                </div>
                <div>
                  <label class="block text-sm font-bold text-gray-600 mb-1">アニメーションテーマ</label>
                  <select name="theme" value={formData.theme} onChange={handleChange} class="w-full px-4 py-2 border rounded-xl focus:ring-2 focus:ring-indigo-400 outline-none bg-white">
                    <option value="hearts">💖 ふわふわハート（感謝・愛情）</option>
                    <option value="stars">⭐ きらきら星（お祝い・ポップ）</option>
                  </select>
                </div>
                <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-xl hover:bg-indigo-700 transition-colors shadow-md mt-4">
                  カードを生成する
                </button>
              </form>

              {/* プレビュー＆共有URL表示エリア */}
              {view === 'preview' && (
                <div class="mt-8 p-6 bg-gray-50 rounded-2xl border border-indigo-100 text-center animate-pop-in">
                  <p class="text-sm font-bold text-indigo-600 mb-3"><i class="fa-solid fa-check-circle mr-1"></i>カードが完成したに！</p>
                  <p class="text-xs text-gray-500 mb-3">下のボタンから実際のカードを確認したり、リンクをコピーして相手にLINE等で送れるわな。</p>
                  <div class="flex flex-col gap-2">
                    <a href={shareUrl} target="_blank" class="block w-full bg-white border-2 border-indigo-600 text-indigo-600 font-bold py-2.5 rounded-xl hover:bg-indigo-50 transition-colors">
                      <i class="fa-solid fa-eye mr-2"></i>自分でプレビューを見る
                    </a>
                    <button onClick={copyToClipboard} class="w-full bg-gray-800 text-white font-bold py-2.5 rounded-xl hover:bg-gray-700 transition-colors shadow-sm">
                      <i class="fa-solid fa-link mr-2"></i>リンクをコピーして贈る
                    </button>
                  </div>
                </div>
              )}
            </div>
          </div>
        );
      }

      // ==========================================
      // 🎁 画面2：カード表示画面（相手が見る画面）
      // ==========================================
      
      // テーマごとの設定（背景色やアイコン）
      const themeConfig = {
        hearts: { bg: 'bg-pink-100', icon: 'fa-heart text-pink-400', animation: 'animate-float' },
        stars: { bg: 'bg-indigo-900 text-white', icon: 'fa-star text-yellow-300', animation: 'animate-fall' }
      };
      const currentTheme = themeConfig[formData.theme] || themeConfig.hearts;

      // ランダムに配置するための配列を20個生成
      const particles = Array.from({ length: 20 });

      return (
        <div class={`min-h-screen relative overflow-hidden flex items-center justify-center p-4 transition-colors duration-1000 ${currentTheme.bg}`}>
          
          {/* 背景のアニメーション装飾 */}
          {particles.map((_, i) => {
            const size = Math.random() * 2 + 1; // 1〜3rem
            const left = Math.random() * 100; // 0〜100%
            const delay = Math.random() * 5; // 0〜5s
            const duration = Math.random() * 5 + 5; // 5〜10s
            return (
              <i key={i} 
                 class={`fa-solid ${currentTheme.icon} ${currentTheme.animation}`} 
                 style={{ 
                   fontSize: `${size}rem`, 
                   left: `${left}%`, 
                   animationDelay: `${delay}s`, 
                   animationDuration: `${duration}s`,
                   opacity: Math.random() * 0.5 + 0.2
                 }}>
              </i>
            );
          })}

          {/* メッセージカード本体 */}
          <div class="relative z-10 bg-white/90 backdrop-blur-md p-8 md:p-12 rounded-3xl shadow-2xl max-w-lg w-full animate-pop-in border border-white/50 text-gray-800">
            <h2 class="text-2xl md:text-3xl font-bold mb-6 text-gray-800 border-b-2 border-gray-100 pb-4">
              {formData.to} へ
            </h2>
            <p class="text-lg md:text-xl leading-relaxed whitespace-pre-wrap font-medium text-gray-600 min-h-[100px]">
              {formData.message}
            </p>
            {formData.from && (
              <p class="text-right mt-8 text-lg font-bold text-gray-500">
                From: {formData.from}
              </p>
            )}
            
            {/* 営業導線（自分も作りたい人向け） */}
            <div class="mt-12 text-center pt-6 border-t border-gray-100">
              <a href={window.location.origin + window.location.pathname} class="text-sm font-bold text-indigo-500 hover:text-indigo-700 transition-colors inline-block bg-indigo-50 px-4 py-2 rounded-full">
                <i class="fa-solid fa-gift mr-1.5"></i>自分もこのカードを贈る
              </a>
            </div>
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
